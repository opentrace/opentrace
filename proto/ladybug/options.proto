// Custom field options for protoc-gen-ladybug.
//
// Import this file in your .proto definitions to customize the generated
// LadybugDB schema:
//
//   import "ladybug/options.proto";
//
//   message FileNode {
//     string id         = 1 [(ladybug.primary_key) = true];
//     string file_path  = 2 [(ladybug.column) = "filePath"];
//   }

syntax = "proto3";

package ladybug;

option go_package = "github.com/opentrace/opentrace/protoc-gen-ladybug/ladybug";

import "google/protobuf/descriptor.proto";

extend google.protobuf.FieldOptions {
  // column overrides the DDL column name for this field.
  // If unset, the proto field name is used as-is.
  optional string column = 51001;

  // primary_key marks this field as the primary key for a Node table.
  // If no field is marked, the first field is used by default.
  // Only one field per message should be marked as the primary key.
  optional bool primary_key = 51002;
}
