name: Preview npm Release

on:
  pull_request:
    types: [labeled, synchronize]
    paths:
      - "components/**"

jobs:
  version:
    name: Compute preview version
    if: contains(github.event.pull_request.labels.*.name, 'preview-npm')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: version
        working-directory: components
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          VERSION="${BASE_VERSION}-pr.${{ github.event.pull_request.number }}.${GITHUB_RUN_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  publish:
    needs: version
    uses: ./.github/workflows/npm-publish.yml
    with:
      version: ${{ needs.version.outputs.version }}
      tag: preview

  comment:
    name: Comment on PR
    needs: [version, publish]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        env:
          PREVIEW_VERSION: ${{ needs.version.outputs.version }}
        with:
          script: |
            const marker = '<!-- opentrace-components-preview -->';
            const body = [
              marker,
              `📦 Preview published: \`@opentrace/components@${process.env.PREVIEW_VERSION}\``,
              '',
              '```bash',
              `npm install @opentrace/components@${process.env.PREVIEW_VERSION}`,
              '```',
              '',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
