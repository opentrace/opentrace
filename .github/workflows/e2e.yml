name: E2E

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Trigger Deployment", "Deploy Preview"]
    types: [completed]

jobs:
  e2e:
    name: Playwright Smoke
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ui
        run: npx playwright install --with-deps chromium

      - name: Resolve target URL
        id: url
        run: |
          if [ "${{ github.event.workflow_run.name }}" = "Deploy Preview" ]; then
            echo "base_url=${{ vars.PREVIEW_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=${{ vars.PRODUCTION_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run E2E tests
        working-directory: ui
        run: npx playwright test
        env:
          BASE_URL: ${{ steps.url.outputs.base_url }}

      - name: Upload report on failure
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 14
