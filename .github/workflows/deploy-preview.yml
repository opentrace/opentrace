name: Deploy Preview

on:
  pull_request_target:
    types: [labeled, synchronize]

jobs:
  trigger-deploy:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'preview-deploy')
    steps:
      - name: Trigger preview deployment
        run: |
          gh api repos/opentrace/opentrace-deployment/dispatches \
            -f event_type=submodule-preview \
            -f 'client_payload[branch]=${{ github.event.pull_request.head.ref }}' \
            -f 'client_payload[clone_url]=${{ github.event.pull_request.head.repo.clone_url }}' \
            -f 'client_payload[pr_number]=${{ github.event.pull_request.number }}' \
            -f 'client_payload[trigger_run_id]=${{ github.run_id }}'
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}

      - name: Watch triggered run until completion
        run: |
          # Poll until a run appears whose name contains our run ID
          for i in $(seq 1 30); do
            RUN_ID=$(gh run list -R opentrace/opentrace-deployment -e repository_dispatch \
              -L 5 --json databaseId,displayTitle \
              -q '.[] | select(.displayTitle | contains("${{ github.run_id }}")) | .databaseId' \
              | head -1)
            if [ -n "$RUN_ID" ]; then
              echo "Watching opentrace-deployment run $RUN_ID"
              gh run watch "$RUN_ID" -R opentrace/opentrace-deployment --exit-status
              exit $?
            fi
            sleep 2
          done
          echo "::error::Timed out waiting for deployment run to appear"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}

  e2e:
    name: Playwright Smoke
    needs: trigger-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ui
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ui
        run: npx playwright test
        env:
          BASE_URL: ${{ vars.PREVIEW_URL }}

      - name: Upload report on failure
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 14
