name: CI

on:
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      ui: ${{ steps.filter.outputs.ui }}
      components: ${{ steps.filter.outputs.components }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          token: ''
          filters: |
            agent:
              - 'agent/**'
            ui:
              - 'ui/**'
            components:
              - 'components/**'

  agent:
    name: Agent (Python)
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Check formatting
        run: uv run ruff format --check src/ tests/

      - name: Test
        run: uv run pytest tests/

  ui:
    name: UI (TypeScript)
    needs: changes
    if: needs.changes.outputs.ui == 'true' || needs.changes.outputs.components == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build components
        working-directory: components
        run: npm ci && npm run build

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Lint
        working-directory: ui
        run: npx eslint .

      - name: Check formatting
        working-directory: ui
        run: npx prettier --check .

      - name: Test
        working-directory: ui
        run: npx vitest run

      - name: Build
        working-directory: ui
        run: npm run build

  components:
    name: Components (TypeScript)
    needs: changes
    if: needs.changes.outputs.components == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: components
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: components/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
