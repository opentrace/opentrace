name: Publish Preview Release

# Publishes the artifact built by publish-preview-build.yml to PyPI.
#
# Runs on workflow_run (base-repo trust context) so that:
#   - OIDC token issuance succeeds (unlike fork pull_request)
#   - PyPI Trusted Publishing accepts the token (unlike pull_request_target)
#
# The build workflow runs in the (untrusted) fork PR context and only produces
# an artifact. This workflow consumes that artifact as data — no fork code
# executes here.
#
# Trust model:
#   - The PR number and the `preview-publish` label are resolved here via the
#     GitHub API from the workflow_run's head ref (head_repository owner +
#     head_branch) — never from the artifact, since the build workflow runs
#     from fork-controlled code and could lie. We use the head ref rather than
#     listPullRequestsAssociatedWithCommit because the latter is unreliable
#     for fork PR commits (GitHub only indexes those associations post-merge).
#   - The label gate from publish-preview-build.yml is re-verified here because
#     a fork can edit the build workflow file in their PR to remove it.
#   - The version string is read from the artifact but must end with the
#     trusted `.dev{PR_NUM}{BUILD_RUN_NUM}` suffix to prevent version squatting.

on:
  workflow_run:
    workflows: ["Publish Preview Release Build"]
    types: [completed]

jobs:
  publish:
    name: Publish preview to PyPI
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
      actions: read
    environment:
      name: pypi
      url: https://pypi.org/project/opentraceai/
    steps:
      - name: Resolve PR and verify label
        id: resolve_pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_REPO_OWNER: ${{ github.event.workflow_run.head_repository.owner.login }}
        with:
          script: |
            const headSha = process.env.HEAD_SHA;
            const headBranch = process.env.HEAD_BRANCH;
            const headRepoOwner = process.env.HEAD_REPO_OWNER;

            // Look up the PR by its head ref. listPullRequestsAssociatedWithCommit
            // is unreliable for fork PR commits — GitHub only consistently indexes
            // commit → PR associations after merge. The head ref (fork:branch) is
            // the authoritative identifier from the workflow_run payload.
            const headRef = `${headRepoOwner}:${headBranch}`;
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: headRef,
            });

            if (pulls.length === 0) {
              core.setFailed(`No open PR found for head ref ${headRef} (build SHA ${headSha})`);
              return;
            }
            if (pulls.length > 1) {
              core.setFailed(`Multiple open PRs found for head ref ${headRef}: ${pulls.map(p => '#' + p.number).join(', ')}`);
              return;
            }

            const pr = pulls[0];
            const hasLabel = pr.labels.some(l => l.name === 'preview-publish');
            if (!hasLabel) {
              core.setFailed(
                `PR #${pr.number} does not have the 'preview-publish' label. ` +
                `Refusing to publish — the label gate in the build workflow can ` +
                `be bypassed by editing the workflow file in a fork PR.`
              );
              return;
            }

            core.setOutput('pr_number', pr.number);
            core.info(`Verified PR #${pr.number} (${headRef}, build SHA ${headSha}) has 'preview-publish' label`);

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: preview-dist
          path: artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify version
        id: meta
        env:
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
          BUILD_RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
        run: |
          VERSION=$(cat artifact/agent/preview-version.txt)
          if ! [[ "${VERSION}" =~ ^[A-Za-z0-9._+-]+$ ]]; then
            echo "Invalid version string: ${VERSION}" >&2
            exit 1
          fi
          # Enforce the trusted suffix so a fork can't publish a non-preview
          # version (e.g. "1.0.0") and squat a future release on PyPI.
          EXPECTED_SUFFIX=".dev${PR_NUMBER}${BUILD_RUN_NUMBER}"
          if [[ "${VERSION}" != *"${EXPECTED_SUFFIX}" ]]; then
            echo "Version '${VERSION}' must end with '${EXPECTED_SUFFIX}'" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: artifact/agent/dist/

      - name: Comment on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PREVIEW_VERSION: ${{ steps.meta.outputs.version }}
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
        with:
          script: |
            const marker = '<!-- opentraceai-preview -->';
            const body = [
              marker,
              `📦 Preview published: \`opentraceai==${process.env.PREVIEW_VERSION}\``,
              '',
              '```bash',
              `pip install opentraceai==${process.env.PREVIEW_VERSION}`,
              '```',
              '',
              '```bash',
              `uv pip install opentraceai==${process.env.PREVIEW_VERSION}`,
              '',
              '# or as a CLI tool',
              `uv tool install opentraceai==${process.env.PREVIEW_VERSION}`,
              '```',
            ].join('\n');

            const issue_number = parseInt(process.env.PR_NUMBER, 10);
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
