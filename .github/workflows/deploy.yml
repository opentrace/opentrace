name: Trigger Deployment

on:
  push:
    branches: [main]

jobs:
  trigger-deploy:
    name: Trigger Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment
        run: |
          gh api repos/opentrace/opentrace-deployment/dispatches \
            -f event_type=submodule-release \
            -f 'client_payload[branch]=main'
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}

      - name: Wait for run to appear
        run: sleep 5

      - name: Watch triggered run until completion
        run: |
          RUN_ID=$(gh run list -R opentrace/opentrace-deployment -e repository_dispatch -L 1 --json databaseId -q '.[0].databaseId')
          echo "Watching opentrace-deployment run $RUN_ID"
          gh run watch "$RUN_ID" -R opentrace/opentrace-deployment --exit-status
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
