name: Trigger Deployment

on:
  push:
    branches: [main]

jobs:
  trigger-deploy:
    name: Trigger Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployment
        run: |
          gh api repos/opentrace/opentrace-deployment/dispatches \
            -f event_type=submodule-release \
            -f 'client_payload[branch]=main' \
            -f 'client_payload[trigger_run_id]=${{ github.run_id }}'
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}

      - name: Watch triggered run until completion
        run: |
          # Poll until a run appears whose name contains our run ID
          for i in $(seq 1 30); do
            RUN_ID=$(gh run list -R opentrace/opentrace-deployment -e repository_dispatch \
              -L 5 --json databaseId,displayTitle \
              -q '.[] | select(.displayTitle | contains("${{ github.run_id }}")) | .databaseId' \
              | head -1)
            if [ -n "$RUN_ID" ]; then
              echo "Watching opentrace-deployment run $RUN_ID"
              gh run watch "$RUN_ID" -R opentrace/opentrace-deployment --exit-status
              exit $?
            fi
            sleep 2
          done
          echo "::error::Timed out waiting for deployment run to appear"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}

  post-deploy-check:
    name: Post-Deploy Health Check
    needs: trigger-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check /api/health
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -sf "https://oss.opentrace.ai/api/health" \
              | jq -r '.status' 2>/dev/null || true)
            if [ "$STATUS" = "ok" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/10 failed, retrying in $((i * 5))s..."
            sleep $((i * 5))
          done
          echo "::error::Health check failed after 10 attempts"
          exit 1

      - name: Check /api/stats returns valid JSON
        run: |
          curl -sf "https://oss.opentrace.ai/api/stats" | jq . > /dev/null
          echo "Stats endpoint returned valid JSON"

      - name: Check UI serves HTML
        run: |
          CONTENT_TYPE=$(curl -sI "https://oss.opentrace.ai" | grep -i content-type | head -1)
          echo "$CONTENT_TYPE"
          echo "$CONTENT_TYPE" | grep -qi "text/html" \
            || { echo "::error::UI did not return HTML"; exit 1; }

  e2e:
    name: Playwright Smoke
    needs: post-deploy-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ui
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ui
        run: npx playwright test
        env:
          BASE_URL: https://oss.opentrace.ai

      - name: Upload report on failure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 14
