name: Publish OpenCode Plugin

on:
  pull_request:
    types: [labeled, synchronize]
    paths:
      - "plugins/opencode/src/**"
      - "plugins/opencode/package.json"
      - "plugins/opencode/bun.lock"
      - "plugins/opencode/tsconfig.json"
  push:
    branches: [main]
    paths:
      - "plugins/opencode/src/**"
      - "plugins/opencode/package.json"
      - "plugins/opencode/bun.lock"
      - "plugins/opencode/tsconfig.json"
    tags:
      - "opencode-plugin-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Exact version to publish (e.g. 0.2.0)"
        required: true
        type: string
      tag:
        description: "npm dist-tag (latest, next, preview)"
        required: true
        type: string

concurrency:
  group: publish-opencode-plugin
  cancel-in-progress: false

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'preview-npm'))
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: version
        working-directory: plugins/opencode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/opencode-plugin-v* ]]; then
            echo "version=${GITHUB_REF_NAME#opencode-plugin-v}" >> "$GITHUB_OUTPUT"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE_VERSION=$(node -p "require('./package.json').version")
            echo "version=${BASE_VERSION}-rc.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            BASE_VERSION=$(node -p "require('./package.json').version")
            echo "version=${BASE_VERSION}-pr.${{ github.event.pull_request.number }}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "tag=preview" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to npm
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/@opentrace/opencode
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version-file: plugins/opencode/.bun-version

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Set version
        working-directory: plugins/opencode
        run: |
          npm version "${{ needs.version.outputs.version }}" --no-git-tag-version
          echo "Publishing @opentrace/opencode@${{ needs.version.outputs.version }} with tag ${{ needs.version.outputs.tag }}"

      - name: Install dependencies
        working-directory: plugins/opencode
        run: bun install --frozen-lockfile

      - name: Build plugin
        working-directory: plugins/opencode
        run: bun run build

      - name: Publish to npm
        working-directory: plugins/opencode
        run: NODE_AUTH_TOKEN="" npm publish --tag "${{ needs.version.outputs.tag }}"

  comment:
    name: Comment on PR
    if: github.event_name == 'pull_request'
    needs: [version, publish]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PREVIEW_VERSION: ${{ needs.version.outputs.version }}
        with:
          script: |
            const marker = '<!-- opentrace-opencode-plugin-preview -->';
            const body = [
              marker,
              `📦 OpenCode plugin preview published: \`@opentrace/opencode@${process.env.PREVIEW_VERSION}\``,
              '',
              '```bash',
              `npm install @opentrace/opencode@${process.env.PREVIEW_VERSION}`,
              '```',
              '',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
