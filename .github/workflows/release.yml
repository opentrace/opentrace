name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CHANGELOG_APP_ID }}
          private-key: ${{ secrets.CHANGELOG_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

      - name: Package UI
        run: |
          cd ui/dist
          zip -r ../../opentrace-ui-${GITHUB_REF_NAME}.zip .

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate release notes
        run: git-cliff --latest --strip header -o RELEASE_NOTES.md

      - name: Create Release
        run: gh release create ${{ github.ref_name }} opentrace-ui-${{ github.ref_name }}.zip --notes-file RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Bump versions and update changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Bump agent version
          sed -i "s/^version = .*/version = \"${VERSION}\"/" agent/pyproject.toml
          sed -i "s/^__version__ = .*/__version__ = \"${VERSION}\"/" agent/src/opentrace_agent/__init__.py

          # Bump UI version
          cd ui
          npm version "${VERSION}" --no-git-tag-version
          cd ..

          # Regenerate full changelog
          git-cliff -o CHANGELOG.md

          # Commit and push to main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add agent/pyproject.toml agent/src/opentrace_agent/__init__.py ui/package.json ui/package-lock.json CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(release): bump to ${VERSION} and update changelog [skip ci]"
          git push


  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/opentraceai/
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version from tag
        working-directory: agent
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          sed -i "s/^__version__ = .*/__version__ = \"${VERSION}\"/" src/opentrace_agent/__init__.py

      - name: Build package
        working-directory: agent
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: agent/dist/
