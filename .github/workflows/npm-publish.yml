name: npm Publish

on:
  pull_request:
    types: [labeled, synchronize]
    paths:
      - "ui/**"
  push:
    branches: [main]
    paths:
      - "ui/**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Exact version to publish (e.g. 0.2.0)"
        required: true
        type: string
      tag:
        description: "npm dist-tag (latest, next, preview)"
        required: true
        type: string

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'preview-npm'))
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - id: version
        working-directory: ui
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE_VERSION=$(node -p "require('./package.json').version")
            echo "version=${BASE_VERSION}-rc.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            BASE_VERSION=$(node -p "require('./package.json').version")
            echo "version=${BASE_VERSION}-pr.${{ github.event.pull_request.number }}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "tag=preview" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to npm
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/@opentrace/opentrace
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Set version
        working-directory: ui
        run: |
          npm version "${{ needs.version.outputs.version }}" --no-git-tag-version
          echo "Publishing @opentrace/opentrace@${{ needs.version.outputs.version }} with tag ${{ needs.version.outputs.tag }}"

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Build library
        working-directory: ui
        run: npm run build:lib

      - name: Publish to npm
        working-directory: ui
        run: NODE_AUTH_TOKEN="" npm publish --tag "${{ needs.version.outputs.tag }}"

  comment:
    name: Comment on PR
    if: github.event_name == 'pull_request'
    needs: [version, publish]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v8
        env:
          PREVIEW_VERSION: ${{ needs.version.outputs.version }}
        with:
          script: |
            const marker = '<!-- opentrace-npm-preview -->';
            const body = [
              marker,
              `📦 Preview published: \`@opentrace/opentrace@${process.env.PREVIEW_VERSION}\``,
              '',
              '```bash',
              `npm install @opentrace/opentrace@${process.env.PREVIEW_VERSION}`,
              '```',
              '',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
