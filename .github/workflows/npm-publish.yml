name: npm Publish

on:
  pull_request:
    types: [labeled, synchronize]
    paths:
      - "components/**"
  push:
    branches: [main]
    paths:
      - "components/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Exact version to publish (e.g. 0.2.0)"
        required: true
        type: string
      tag:
        description: "npm dist-tag (latest, next, preview)"
        required: true
        type: string

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'preview-npm'))
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - id: version
        working-directory: components
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE_VERSION=$(node -p "require('./package.json').version")
            echo "version=${BASE_VERSION}-rc.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            BASE_VERSION=$(node -p "require('./package.json').version")
            echo "version=${BASE_VERSION}-pr.${{ github.event.pull_request.number }}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "tag=preview" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to npm
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Set version
        working-directory: components
        run: |
          npm version "${{ needs.version.outputs.version }}" --no-git-tag-version
          echo "Publishing @opentrace/components@${{ needs.version.outputs.version }} with tag ${{ needs.version.outputs.tag }}"

      - name: Install dependencies
        working-directory: components
        run: npm ci

      - name: Build
        working-directory: components
        run: npm run build

      - name: Publish to npm
        working-directory: components
        run: NODE_AUTH_TOKEN="" npm publish --tag "${{ inputs.tag }}" --loglevel verbose
