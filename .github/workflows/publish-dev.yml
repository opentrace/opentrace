name: Publish Dev Release

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "components/**"

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.filter.outputs.agent }}
      components: ${{ steps.filter.outputs.components }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          token: ''
          filters: |
            agent:
              - 'agent/**'
            components:
              - 'components/**'

  publish-dev:
    name: Publish dev to PyPI
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/opentraceai/
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set rc version
        working-directory: agent
        run: |
          BASE_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          RC_VERSION="${BASE_VERSION}rc${GITHUB_RUN_NUMBER}"
          sed -i "s/^version = .*/version = \"${RC_VERSION}\"/" pyproject.toml
          sed -i "s/^__version__ = .*/__version__ = \"${RC_VERSION}\"/" src/opentrace_agent/__init__.py
          echo "Published version: ${RC_VERSION}"

      - name: Build package
        working-directory: agent
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: agent/dist/

  npm-version:
    name: Compute npm rc version
    needs: changes
    if: needs.changes.outputs.components == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: version
        working-directory: components
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          VERSION="${BASE_VERSION}-rc.${GITHUB_RUN_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  publish-npm-dev:
    name: Publish dev to npm
    needs: npm-version
    uses: ./.github/workflows/npm-publish.yml
    with:
      version: ${{ needs.npm-version.outputs.version }}
      tag: next
