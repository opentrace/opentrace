site_name: OpenTrace
site_url: https://opentrace.github.io/opentrace
site_description: A knowledge graph that maps your codebase structure, service architecture, and system relationships.
repo_url: https://github.com/opentrace/opentrace
repo_name: opentrace/opentrace
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - Architecture:
      - Overview: architecture/overview.md
  - Development:
      - Setup: development/setup.md
      - Contributing: development/contributing.md
  - Reference:
      - Chat Providers: reference/chat-providers.md
      - Supported Languages: reference/languages.md
