[project]
name = "opentrace-agent"
version = "0.1.0"
description = "OpenTrace Python agent for collecting and reporting traces"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "langchain-core>=0.3",
    "langgraph>=0.2",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "mcp>=1.0",
    "httpx>=0.27",
    "pyyaml>=6.0",
    "anyio>=4.0",
    "protobuf>=4.0",
    "grpcio>=1.60",
    "gitpython>=3.1",
    "tree-sitter>=0.24",
    "tree-sitter-python",
    "tree-sitter-typescript",
    "tree-sitter-go",
    "dependency-injector>=4.43",
    "click>=8.0",
    "kuzu>=0.9",
]

[project.optional-dependencies]
summarization = [
    "optimum[onnxruntime]>=1.17",
    "transformers>=4.38",
]

[project.scripts]
opentrace = "opentrace_agent.cli.main:app"
opentrace-agent = "opentrace_agent.main:main"
opentrace-agent-server = "opentrace_agent.server:main"

[dependency-groups]
dev = ["pytest", "pytest-anyio", "pytest-httpx", "ruff", "grpcio-tools>=1.60"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opentrace_agent"]

[tool.ruff]
exclude = ["src/opentrace_agent/gen"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
